version: '3.8'

services:
  # API FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn eia_ingest.api:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis

  # Celery Worker (ejecuta tareas)
  worker:
    build: .
    env_file:
      - .env
    command: celery -A eia_ingest.worker worker --loglevel=info --concurrency=2
    depends_on:
      - redis

  # Celery Beat (scheduler - cada 30 min)
  beat:
    build: .
    env_file:
      - .env
    command: celery -A eia_ingest.worker beat --loglevel=info
    depends_on:
      - redis

  # Redis (broker de Celery)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379